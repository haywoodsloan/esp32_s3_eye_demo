<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32-S3-EYE Face Detection</title>
<style>
  :root { color-scheme: dark; }
  body {
    font-family: system-ui, sans-serif;
    background: #0f1115; color: #e9eaee;
    margin: 0; padding: 24px;
  }
  h1 { margin: 0 0 16px; font-weight: 600; }
  #status { color: #888; font-size: 13px; margin-bottom: 16px; }
  #grid { display: grid; gap: 20px;
          grid-template-columns: repeat(auto-fill, minmax(216px, 1fr)); }
  .card {
    background: #1a1d24;
    border: 1px solid #2a2e38;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }
  .card img {
    width: 172px; height: 172px;
    image-rendering: pixelated;
    background: #000;
    border-radius: 10px;
    display: block; margin: 0 auto 10px;
  }
  .meta { font-size: 13px; color: #888; margin-bottom: 10px; }
  .row { display: flex; gap: 8px; }
  input[type=text] {
    flex: 1; min-width: 0;
    background: #0f1115; color: #e9eaee;
    border: 1px solid #2a2e38; border-radius: 7px;
    padding: 9px 12px; font-size: 15px;
  }
  button {
    background: #2a78ff; color: white; border: 0;
    border-radius: 7px; padding: 9px 16px; cursor: pointer;
    font: inherit;
  }
  button:hover { background: #3a88ff; }
  button.delete {
    background: #b03030; flex: 1; margin-top: 6px;
  }
  button.delete:hover { background: #d04040; }
  button:disabled {
    background: #444; color: #999; cursor: default;
  }
  .empty { color: #888; padding: 32px; text-align: center; }
</style>
</head>
<body>
<h1>ESP32-S3-EYE Face Detection</h1>
<div id="status">loading\u2026</div>
<div id="grid"></div>
<script>
let lastCount = -1;
function displayName(f) {
  return (f.name && f.name.length) ? f.name : ('#' + (f.id + 1));
}
async function load() {
  try {
    const r = await fetch('/api/faces');
    const list = await r.json();
    document.getElementById('status').textContent =
      list.length + ' face' + (list.length === 1 ? '' : 's') + ' enrolled';
    if (list.length === lastCount) {
      // Same count; only refresh names (avoids flashing thumbnails).
      for (const f of list) {
        const card  = document.getElementById('face-' + f.id);
        if (!card) continue;
        const input = card.querySelector('input');
        const meta  = card.querySelector('.meta');
        if (input && document.activeElement !== input) input.value = f.name || '';
        if (meta) meta.textContent = displayName(f);
      }
      return;
    }
    lastCount = list.length;
    const grid = document.getElementById('grid');
    if (list.length === 0) {
      grid.innerHTML = '<div class="empty">No faces yet. Stand in front of the camera.</div>';
      return;
    }
    grid.innerHTML = '';
    for (const f of list) {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = 'face-' + f.id;
      card.innerHTML =
        '<img src="/api/face/' + f.id + '/thumb">'
        + '<div class="meta">' + displayName(f).replace(/</g, '&lt;') + '</div>'
        + '<div class="row">'
        +   '<input type="text" placeholder="name" value="'
        +     (f.name || '').replace(/"/g, '&quot;') + '">'
        +   '<button class="save">Save</button>'
        + '</div>'
        + '<div class="row">'
        +   '<button class="delete">Delete</button>'
        + '</div>';
      const input    = card.querySelector('input');
      const meta     = card.querySelector('.meta');
      const saveBtn  = card.querySelector('button.save');
      const deleteBtn = card.querySelector('button.delete');
      saveBtn.onclick = async () => {
        await fetch('/api/face/' + f.id + '/name', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: input.value
        });
        // Optimistic local update so the meta line flips immediately,
        // before the next poll round-trip lands.
        f.name = input.value;
        meta.textContent = displayName(f);
        load();
      };
      deleteBtn.onclick = async () => {
        const label = displayName(f);
        if (!confirm('Delete ' + label + '? This cannot be undone.')) return;
        // Disable the buttons so a slow network can't fire double-deletes.
        saveBtn.disabled = true;
        deleteBtn.disabled = true;
        try {
          const r = await fetch('/api/face/' + f.id, { method: 'DELETE' });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          // Force a fresh card layout on the next poll -- after delete
          // every subsequent face's id has shifted down, so we can't
          // safely reuse any of the existing DOM cards.
          lastCount = -1;
          load();
        } catch (err) {
          alert('Delete failed: ' + err);
          saveBtn.disabled = false;
          deleteBtn.disabled = false;
        }
      };
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveBtn.click();
      });
      grid.appendChild(card);
    }
  } catch (err) {
    document.getElementById('status').textContent = 'error: ' + err;
  }
}
load();
setInterval(load, 2000);
</script>
</body>
</html>
