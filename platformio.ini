; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200

; ESP32-S3-EYE hardware: 8 MB octal PSRAM + 8 MB flash
board_build.flash_mode = dio
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_build.partitions = partitions.csv

; ESP-IDF + CONFIG_COMPILER_CXX_EXCEPTIONS leaks -fuse-cxa-atexit into the
; C build flags, which trips -Werror on C files. The flag is a C++-only
; ABI knob; dropping it globally is harmless on this target (no process
; exit / no global destructors run at "program end" on an MCU).
build_unflags = -fuse-cxa-atexit

; ESP-WHO face-detection / -recognition .espdl model blobs live in their
; own flash partitions (see partitions.csv + sdkconfig.defaults). PIO's
; espressif32 platform only auto-flashes bootloader/partition-table/app
; and never reads board.upload.flash_extra_images. The pre-script appends
; our model blobs to SCons env's FLASH_EXTRA_IMAGES before the platform
; expands that list into the esptool command line.
extra_scripts =
    pre:scripts/embed_web_html.py
    pre:scripts/flash_espdl_models.py

; ---------------------------------------------------------------------
; Alternate build: ESPDET_PICO_224_224_FACE detector
; ---------------------------------------------------------------------
;
; Same app and recognition pipeline as the default env; the only
; differences are the detector model and the partition that hosts it.
;   * The MSR+MNP two-stage cascade (default) is ~43 ms / 191 KB /
;     0.367 mAP50-95.
;   * ESPDET_PICO_224_224_FACE is single-stage, ~130 ms / 496 KB /
;     0.495 mAP50-95 -- +35 % relative accuracy at ~3 x inference
;     cost. Recommended A/B subject when comparing detector quality
;     against the default.
;
; Picks up the overlay file `sdkconfig.defaults.pico224` (model
; selection + partition table choice) and `partitions.pico224.csv`
; (face-det partition resized 256 KB -> 512 KB).
;
; The pre:flash_espdl_models.py script switches its source list +
; partition offsets based on the PIO env name suffix `-pico224`.
;
; Use:   pio run -e esp32-s3-devkitc-1-pico224 -t upload
[env:esp32-s3-devkitc-1-pico224]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200

board_build.flash_mode = dio
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_build.partitions = partitions.pico224.csv

board_build.sdkconfig_defaults =
    sdkconfig.defaults
    sdkconfig.defaults.pico224

build_unflags = -fuse-cxa-atexit

extra_scripts =
    pre:scripts/embed_web_html.py
    pre:scripts/flash_espdl_models.py
