; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200

; ESP32-S3-EYE hardware: 8 MB octal PSRAM + 8 MB flash
board_build.flash_mode = dio
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_build.partitions = partitions.csv

; ESP-IDF + CONFIG_COMPILER_CXX_EXCEPTIONS leaks -fuse-cxa-atexit into the
; C build flags, which trips -Werror on C files. The flag is a C++-only
; ABI knob; dropping it globally is harmless on this target (no process
; exit / no global destructors run at "program end" on an MCU).
build_unflags = -fuse-cxa-atexit

; Test #15: enable ESP-DL's built-in per-stage latency logging so the
; feat=~975 ms cost gets broken down into "feat: pre", "feat: model",
; "feat: post" lines (us) by FeatImpl::run -- exactly the
; preprocess/inference/postprocess split we need to choose between the
; scalar-warp vs PSRAM-bandwidth hypotheses.
build_flags = -DDL_LOG_INFER_LATENCY=1

; ESP-WHO face-detection / -recognition .espdl model blobs live in their
; own flash partitions (see partitions.csv + sdkconfig.defaults). PIO's
; espressif32 platform only auto-flashes bootloader/partition-table/app
; and never reads board.upload.flash_extra_images. The pre-script appends
; our model blobs to SCons env's FLASH_EXTRA_IMAGES before the platform
; expands that list into the esptool command line.
extra_scripts =
    pre:scripts/embed_web_html.py
    pre:scripts/flash_espdl_models.py
